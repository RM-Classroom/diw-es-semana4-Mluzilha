<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fandora</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background-color: #0f0f0f;
      color: white;
    }
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      position: absolute;
      top: 0;
      width: 100%;
      background: transparent;
      z-index: 10;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: #2a2a2a;
      padding: 8px 12px;
      border-radius: 10px;
      width: 40px;
      overflow: hidden;
      transition: 0.4s;
      cursor: text;
    }

    .search-box i {
      color: gray;
    }

    .search-box input {
      border: none;
      background: transparent;
      color: white;
      outline: none;
      width: 0;
      opacity: 0;
      transition: 0.3s;
    }

    .search-box:focus-within {
      width: 220px;
      box-shadow: 0 0 10px #8a2be2;
    }

    .search-box:focus-within input {
      width: 100%;
      opacity: 1;
      margin-left: 8px;
    }

    #btnPerfil {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f5b400;
      border: none;
      padding: 8px 12px;
      border-radius: 20px;
      cursor: pointer;
      z-index: 10;
    }

    #btnPerfil.logado {
      background: transparent;
      color: white;
      font-weight: bold;
    }

    #iconePerfil {
      display: none;
    }

    #btnPerfil.logado #iconePerfil {
      display: inline;
    }

    .menu-perfil {
      position: absolute;
      top: 60px;
      right: 20px;
      background: #1a1a1a;
      padding: 10px;
      border-radius: 10px;
      width: 150px;
      opacity: 0;
      transform: translateY(-10px);
      pointer-events: none;
      transition: 0.3s;
      z-index: 20;
    }

    .menu-perfil.ativo {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .menu-perfil p:hover {
      background: #333;
    }

    .banner {
      width: 100%;
      height: 80vh;
      background: url('estrelasss.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      padding: 60px;
      position: relative;
    }

    .banner::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.7), #0f0f0f);
      z-index: 1;
    }

    .banner div {
      position: relative;
      z-index: 2;
      max-width: 400px;
    }

    .banner button {
      background: #8a2be2;
      border: none;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      color: white;
    }

    .filmes {
      padding: 20px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      height: 220px;
      position: relative;
      width: 100%;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    }

    .card h3 {
      position: absolute;
      bottom: 40px;
      left: 10px;
      margin: 0;
      z-index: 2;
    }

    .card p {
      position: absolute;
      bottom: 20px;
      left: 10px;
      margin: 0;
      color: #ccc;
      z-index: 2;
    }

    .card button {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 20px;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 2;
    }

    .card button.favorito {
      color: red;
    }

  </style>
</head>

<body>

<header class="navbar">
  <h1>🎬 Fandora</h1>

  <div class="search-box">
    <i class="fa fa-search"></i>
    <input type="text" placeholder="Buscar...">
  </div>

  <button id="btnPerfil" onclick="abrirLogin()">
    <i id="iconePerfil" class="fa fa-user"></i>
    <span id="textoPerfil">Entrar</span>
  </button>

  <div id="menuPerfil" class="menu-perfil">
    <p onclick="irPerfil()">Perfil</p>
    <p onclick="logout()">Sair</p>
  </div>
</header>

<section class="banner">
  <div>
    <h2>Devorador de Estrelas</h2>
    <p>Uma aventura épica no espaço...</p>
    <button onclick="window.location.href='filme.html'">Ver detalhes</button>
  </div>
</section>

<div class="container-fluid mt-3 px-4">
  <section class="filmes">

    <div class="row g-4">

      <div class="col-12 col-md-6">
        <div class="card">
          <img src="img1.jpg">
          <h3>Matrix</h3>
          <p>1999 • Ficção Científica</p>
          <button onclick="toggleFavorito(this, 'Matrix')">🤍</button>
        </div>
      </div>

      <div class="col-12 col-md-6">
        <div class="card">
          <img src="img2.jpg">
          <h3>Meninas Malvadas</h3>
          <p>Comédia</p>
          <button onclick="toggleFavorito(this, 'Meninas Malvadas')">🤍</button>
        </div>
      </div>

    </div>

  </section>
</div>

<script>
function abrirLogin() {
  let nome = prompt("Digite seu nome:");
  if(nome){
    localStorage.setItem("nome", nome);
    localStorage.setItem("logado", "sim");
    atualizarNavbar();
  }
}

function atualizarNavbar() {
  let usuario = localStorage.getItem("logado");
  let nome = localStorage.getItem("nome");

  let texto = document.getElementById("textoPerfil");
  let botao = document.getElementById("btnPerfil");

  if(usuario){
    texto.innerText = "Olá, " + nome;
    botao.onclick = toggleMenu;
    botao.classList.add("logado");
  } else {
    texto.innerText = "Entrar";
    botao.onclick = abrirLogin;
    botao.classList.remove("logado");
  }
}

function toggleMenu() {
  document.getElementById("menuPerfil").classList.toggle("ativo");
}

function logout() {
  localStorage.removeItem("logado");
  atualizarNavbar();
}

function irPerfil() {
  window.location.href = "perfil.html";
}

function toggleFavorito(botao, filme) {
  let favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];

  if (favoritos.includes(filme)) {
    favoritos = favoritos.filter(f => f !== filme);
    botao.classList.remove("favorito");
    botao.innerText = "🤍";
  } else {
    favoritos.push(filme);
    botao.classList.add("favorito");
    botao.innerText = "❤️";
  }

  localStorage.setItem("favoritos", JSON.stringify(favoritos));
}

window.onload = function () {
  atualizarNavbar();

  let favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];

  document.querySelectorAll(".card").forEach(card => {
    let nome = card.querySelector("h3").innerText;
    let botao = card.querySelector("button");

    if (favoritos.includes(nome)) {
      botao.classList.add("favorito");
      botao.innerText = "❤️";
    }
  });
};

document.querySelector(".search-box").addEventListener("click", function() {
  this.querySelector("input").focus();
});
</script>

</body>
</html>
